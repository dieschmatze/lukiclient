plugins {
    id 'java'
    id 'application'
}

group = 'de.luki'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // Add your dependencies here
    testImplementation 'junit:junit:4.13.2'
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

application {
    mainClass = 'de.luki.Main' // Adjust to your main class
}

jar {
    manifest {
        attributes 'Main-Class': 'de.luki.Main' // Adjust to your main class
    }
}
