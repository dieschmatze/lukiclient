name: Build LukiClient JAR

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          
      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.12.0/gradlew -o gradlew
            mkdir -p gradle/wrapper
            curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.12.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Grant execute permission
        run: chmod +x gradlew
        
      - name: Build
        run: ./gradlew build --no-daemon
        
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: LukiClient-JAR
          path: build/libs/*.jar
